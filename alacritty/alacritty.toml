[general]
import = ["~/.config/alacritty/themes/noctalia.toml"]
live_config_reload=true

[window]
decorations = "None"
opacity = 0.90
dynamic_padding = true

[scrolling]
history = 100000

[font]
normal = { family = "IBM Plex Mono", style = "Regular" }
size = 13.2

[cursor]
style = {shape = "Block", blinking = "On"}

[terminal]
shell = "/usr/bin/fish"

[mouse]
hide_when_typing = true
